name: "PR Ephemeral Environment Automation"

on:
  pull_request:
    types: [opened, synchronize, closed]
  workflow_dispatch:
    inputs:
      custom_cluster_name:
        description: 'Enter targeted Name for manual sandbox deployment'
        required: true
        default: 'manual-aurora-sandbox'
        type: string
      custom_snapshot_id:
        description: 'Provide manual Snapshot Identifier or ARN to clone from'
        required: true
        type: string

jobs:
  ephemeral-db:
    name: "Manage Sandbox Database Lift"
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "us-east-1"
      TF_VAR_pr_number: ${{ github.event.number || 'manual' }}
      # Handles mappings dynamically depending on manual UI trigger vs PR trigger
      TF_VAR_db_cluster_name: ${{ github.event.inputs.custom_cluster_name || format('pr-{0}-cluster', github.event.number) }}
      TF_VAR_target_snapshot_identifier: ${{ github.event.inputs.custom_snapshot_id || 'production-sanitized-snapshot-default' }}

    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Install and Setup HashiCorp Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Initialize Core Platform Components
        run: terraform init

      # STEP A: Provisions the infrastructure if PR is opened or run is dispatched manually
      - name: Provision Ephemeral Sandbox Instance
        if: github.event.action != 'closed'
        run: |
          ENV_ID=${{ github.event.number || 'manual-run' }}
          terraform workspace select pr-$ENV_ID || terraform workspace new pr-$ENV_ID
          terraform apply -auto-approve

      # STEP B: Triggers cleanup automatically when a PR is merged or closed
      - name: Destroy and Clean Ephemeral Sandbox Instance
        if: github.event.action == 'closed'
        run: |
          terraform workspace select pr-${{ github.event.number }}
          terraform destroy -auto-approve
          terraform workspace select default
          terraform workspace delete pr-${{ github.event.number }}